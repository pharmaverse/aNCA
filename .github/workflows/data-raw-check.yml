# Check that data-raw outputs are up to date.
#
# Runs data-raw/rebuild.R and fails if any tracked files changed,
# meaning the committed outputs are stale.

name: Data Raw Check

on:
  workflow_dispatch:
    inputs:
      r-version:
        description: "The version of R to use"
        default: "release"
        required: false
        type: choice
        options:
          - devel
          - latest
  workflow_call:
    inputs:
      r-version:
        description: "The version of R to use"
        default: "release"
        required: false
        type: string

concurrency:
  group: data-raw-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  data-raw-check:
    name: Data Raw
    runs-on: ubuntu-latest
    if: >
      !contains(github.event.commits[0].message, '[skip data-raw]')
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ inputs.r-version }}
          use-public-rspm: true

      - name: Install R Dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            local::.
            any::usethis
            any::sass

      - name: Run data-raw/rebuild.R
        run: source("data-raw/rebuild.R")
        shell: Rscript {0}

      - name: Check outputs are up to date
        run: |
          # Exclude data/*.rda from the check — R's save() serialization is
          # not deterministic across versions/platforms so identical data can
          # produce different binary output.  The CSV snapshots in
          # data-raw/test/ are the deterministic proxy that catches real
          # data changes.
          git status -s -- ':!data/*.rda'
          if [[ -n $(git status -s -- ':!data/*.rda') ]]; then
            echo "::error::data-raw outputs are stale. Run 'Rscript data-raw/rebuild.R' and commit the results."
            echo ""
            echo "The following files differ:"
            git diff --stat -- ':!data/*.rda'
            echo ""
            git diff -- ':!data/*.rda'
            exit 1
          else
            echo "data-raw outputs are up to date."
          fi
        shell: bash
