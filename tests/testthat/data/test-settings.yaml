settings:
  analyte: Analyte01
  profile: DOSE 1
  pcspec: SERUM
  method: lin up/log down
  bioavailability: ~
  data_imputation:
    impute_c0: yes
    blq_strategy: No BLQ handling
    blq_imputation_rule:
      first: keep
      middle: keep
      last: keep
  int_parameters:
    parameter:
    - AUCINT
    - AUCINTda
    start_auc:
    - 0.0
    - 0.0
    end_auc:
    - 24.0
    - 24.0
