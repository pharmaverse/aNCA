settings:
  method: lin up/log down
  bioavailability: f_aucinf.obs
  data_imputation:
    impute_c0: yes
    blq_strategy: No BLQ handling
    blq_imputation_rule:
      first: keep
      middle: keep
      last: keep
  flags:
    R2ADJ:
      is.checked: no
      threshold: 0.7
    R2:
      is.checked: yes
      threshold: 0.8
    AUCPEO:
      is.checked: yes
      threshold: 30
    AUCPEP:
      is.checked: no
      threshold: 30
    LAMZSPN:
      is.checked: yes
      threshold: 2
  parameters:
    selections:
      Excretion Data:
      - ae
      - fe
      Single Extravascular:
      - adj.r.squared
      - aucinf.obs
      - aucinf.obs.dn
      - auclast
      - auclast.dn
      - aucpext.obs
      - c0
      - cl.obs
      - clast.obs
      - clast.obs.dn
      - cmax
      - cmax.dn
      - half.life
      - lambda.z
      - lambda.z.n.points
      - lambda.z.time.first
      - mrt.last
      - mrt.obs
      - r.squared
      - span.ratio
      - tlast
      - tmax
      - vz.obs
      - vss.obs
      Single Extravascular (Metabolite):
